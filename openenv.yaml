spec_version: 1
name: cyber-defense-env
description: >
  Cyber defense RL environment where an agent monitors
  network signals and responds to attacks across 3 tasks.
author: RagaArohi
version: "1.0.0"
type: sequential
runtime: docker
app: app:app
port: 7860
tasks:
  - task_id: detect_recon
    name: Detect Reconnaissance
    max_steps: 30
    grader:
      type: deterministic
      endpoint: /grader
  - task_id: stop_exploit
    name: Stop Active Exploitation
    max_steps: 40
    grader:
      type: deterministic
      endpoint: /grader
  - task_id: prevent_exfil
    name: Prevent Data Exfiltration
    max_steps: 50
    grader:
      type: deterministic
      endpoint: /grader
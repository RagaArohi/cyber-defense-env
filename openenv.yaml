spec_version: 1
name: cyber-defense-env
description: >
  Cyber defense RL environment where an agent monitors
  network signals and responds to attacks across 3 tasks.
author: RagaArohi
version: "1.0.0"
type: sequential
runtime: docker
app: server.app:app
port: 7860
tasks:
  - task_id: detect_recon
    name: Detect Reconnaissance
    description: >
      Agent monitors network signals and must detect
      a port-scan/recon attack within 15 steps.
    max_steps: 15
    grader:
      type: deterministic
      endpoint: /grader
  - task_id: stop_exploit
    name: Stop Exploit Attempt
    description: >
      Agent must identify and block an active exploit
      attempt before the attacker reaches stage 3.
    max_steps: 20
    grader:
      type: deterministic
      endpoint: /grader
  - task_id: prevent_exfil
    name: Prevent Data Exfiltration
    description: >
      Agent must detect and stop data exfiltration
      within a multi-stage APT kill chain.
    max_steps: 25
    grader:
      type: deterministic
      endpoint: /grader